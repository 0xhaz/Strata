[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
tranche_vault = "fmnzmMUcR2nojDq1TrSywozC7FUTnpJTMb6fTfoUPng"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

# Default gossip port 8000 is taken by another local process — move our ports.
[test.validator]
gossip_port = 8010
dynamic_port_range = "8011-8040"
